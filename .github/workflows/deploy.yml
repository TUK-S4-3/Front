name: Deploy Main via SSM

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    name: SSM Deploy
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 30
    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      EC2_INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
      SERVICE_NAME: ${{ secrets.SERVICE_NAME }}
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Validate deploy configuration
        shell: bash
        run: |
          set -euo pipefail

          test -n "${AWS_REGION}" || { echo "secrets.AWS_REGION is required"; exit 1; }
          test -n "${EC2_INSTANCE_ID}" || { echo "secrets.EC2_INSTANCE_ID is required"; exit 1; }
          test -n "${DEPLOY_PATH}" || { echo "secrets.DEPLOY_PATH is required"; exit 1; }

      - name: Send deploy command via SSM
        id: send
        shell: bash
        run: |
          set -euo pipefail

          COMMANDS=$(cat <<EOF
          [
            "set -eu",
            "sudo -u ubuntu -H bash -lc 'set -eu; cd \"${DEPLOY_PATH}\"; git -c safe.directory=\"${DEPLOY_PATH}\" fetch origin main; git -c safe.directory=\"${DEPLOY_PATH}\" checkout main; git -c safe.directory=\"${DEPLOY_PATH}\" pull --ff-only origin main; cd client; npm ci; npm run build'",
            "if [ -n \\\"${SERVICE_NAME}\\\" ]; then sudo systemctl restart \\\"${SERVICE_NAME}\\\"; fi"
          ]
          EOF
          )

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${EC2_INSTANCE_ID}" \
            --document-name "AWS-RunShellScript" \
            --comment "deploy main ${GITHUB_SHA}" \
            --parameters "commands=${COMMANDS}" \
            --query "Command.CommandId" \
            --output text)

          echo "command_id=${COMMAND_ID}" >> "${GITHUB_OUTPUT}"

      - name: Wait for SSM result
        shell: bash
        run: |
          set -euo pipefail

          COMMAND_ID="${{ steps.send.outputs.command_id }}"

          while true; do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "${COMMAND_ID}" \
              --instance-id "${EC2_INSTANCE_ID}" \
              --query "Status" \
              --output text 2>/dev/null || true)

            echo "SSM status: ${STATUS}"

            case "${STATUS}" in
              Success)
                break
                ;;
              Pending|InProgress|Delayed|"")
                sleep 5
                ;;
              Cancelled|Cancelling|TimedOut|Failed)
                aws ssm get-command-invocation \
                  --command-id "${COMMAND_ID}" \
                  --instance-id "${EC2_INSTANCE_ID}" \
                  --query "StandardErrorContent" \
                  --output text || true
                exit 1
                ;;
              *)
                sleep 5
                ;;
            esac
          done

      - name: Print command output
        if: always()
        shell: bash
        run: |
          set -euo pipefail

          COMMAND_ID="${{ steps.send.outputs.command_id }}"

          echo "---- STDOUT ----"
          aws ssm get-command-invocation \
            --command-id "${COMMAND_ID}" \
            --instance-id "${EC2_INSTANCE_ID}" \
            --query "StandardOutputContent" \
            --output text || true

          echo "---- STDERR ----"
          aws ssm get-command-invocation \
            --command-id "${COMMAND_ID}" \
            --instance-id "${EC2_INSTANCE_ID}" \
            --query "StandardErrorContent" \
            --output text || true
