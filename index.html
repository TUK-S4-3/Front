<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>gaussian | Home</title>

    <link rel="stylesheet" href="/src/css/base.css" />
    <link rel="stylesheet" href="/src/css/home.css" />
  </head>
  <body>
  <!-- Background Video -->
  <video
  id="bgVideo"
  autoplay
  muted
  playsinline
  preload="metadata"
  aria-hidden="true"
  ></video>
  <div class="bgOverlay" aria-hidden="true"></div>


    <!-- Top Nav -->
    <header class="topbar topbar--transparent">
      <div class="container topbar__inner">
        <a class="brand" href="/index.html" aria-label="홈으로 이동">
          <span class="brand__mark brand__mark--gaussian"></span>
          <span class="brand__text brand__text--gaussian">GAUSSIAN</span>
        </a>

        <nav class="nav" aria-label="주요 메뉴">
          <a class="nav__link" href="/index.html#features">기능</a>
          <a class="nav__link" href="/index.html#about">소개</a>
        </nav>

        <div class="auth">
          <span id="authGreeting" class="auth__greeting" aria-live="polite"></span>
          <a id="loginLink" class="btn btn--ghost btn--gaussian" href="/login.html">로그인</a>
          <button id="logoutBtn" class="btn btn--ghost btn--gaussian" type="button" hidden>로그아웃</button>
        </div>
      </div>
    </header>

    <main>
      <!-- Hero -->
      <section class="hero hero--gaussian">
        <div class="container hero__center">
          <h1 class="hero__title hero__title--gaussian">
          Scale-Aware Gaussian 
          </h1>

          <p class="hero__sub hero__sub--gaussian">
           3D 장면 재구성 서비스
          </p>

          <div class="hero__ctaRow">
            <a class="btnCtaBig" href="/login.html">
              시작하기 <span class="btnCtaBig__arrow" aria-hidden="true">›</span>
            </a>
          </div>

        </div>

        <div class="hero__fade" aria-hidden="true"></div>
      </section>

      <section id="features" class="section">
        <div class="container">
          <h2 class="section__title">기능</h2>
          <p class="section__desc">3D 장면 재구성에 특화된 기능들을 제공합니다.</p>

          <div class="grid3">
            <article class="card">
              <h3>2D 이미지 처리</h3>
              <p>2D 이미지를 입력으로 받아 3D 장면을 재구성합니다.</p>
            </article>
            <article class="card">
              <h3></h3>
              <p></p>
            </article>
            <article class="card">
              <h3></h3>
              <p></p>
            </article>
          </div>
        </div>
      </section>

      <section id="about" class="section section--muted">
        <div class="container">
          <h2 class="section__title">소개</h2>
          <p class="section__desc">
            소개
          </p>
        </div>
      </section>

      <footer class="footer">
        <div class="container footer__inner">
          <span>© <span id="year"></span> gaussian</span>
          <span class="footer__sep">|</span>
          <a class="footer__link" href="/login.html">Login</a>
        </div>
      </footer>
    </main>

    <script type="module" src="/src/js/home.js"></script>
  </body>
</html>
